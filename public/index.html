<!-- ============================================================
     FLORA IMAGE — SVG illustration or real photo
     ============================================================ -->
<script type="text/babel">
function FloraImage({ plant, size = 200, style = {}, rounded = 24, photoUrl }) {
  // If a real photo exists, show it.
  if (photoUrl) {
    return (
      <div style={{
        width: size, height: size, borderRadius: rounded, overflow: 'hidden',
        background: `#000 center/cover url(${photoUrl})`, position: 'relative',
        ...style,
      }} />
    );
  }

  const { leafShape, colors, id } = plant;
  const [a, b, c] = colors;

  const renderShape = () => {
    switch (leafShape) {
      case 'fenestrated':
        return (
          <g>
            <path d="M50 80 Q 20 50 30 20 Q 60 5 90 15 Q 130 30 140 70 Q 150 130 120 160 Q 85 180 55 160 Q 25 140 50 80 Z" fill={b} />
            <ellipse cx="70" cy="60" rx="8" ry="15" fill={a} opacity="0.55" />
            <ellipse cx="95" cy="80" rx="10" ry="18" fill={a} opacity="0.55" />
            <ellipse cx="75" cy="110" rx="9" ry="14" fill={a} opacity="0.55" />
            <ellipse cx="105" cy="130" rx="7" ry="12" fill={a} opacity="0.55" />
            <path d="M85 20 L 85 170" stroke={a} strokeWidth="2" opacity="0.6" />
          </g>
        );
      case 'linear':
        return (
          <g>
            {[0, 1, 2].map(i => (
              <g key={i} transform={`translate(${50 + i * 30}, 30) rotate(${-10 + i * 10})`}>
                <rect x="0" y="40" width="3" height="100" fill={a} />
                {[0, 1, 2, 3, 4, 5].map(j => (
                  <ellipse key={j} cx="1.5" cy={40 + j * 8} rx="7" ry="5" fill={b} opacity={0.85 - j * 0.08} />
                ))}
              </g>
            ))}
          </g>
        );
      case 'pinnate':
        return (
          <g transform="translate(100, 20)">
            <path d="M0 0 Q -5 80 0 160" stroke={a} strokeWidth="2.5" fill="none" />
            {Array.from({ length: 12 }).map((_, i) => {
              const y = 10 + i * 12;
              const w = 35 - Math.abs(i - 5) * 3;
              return (
                <g key={i}>
                  <ellipse cx={-w / 2 - 5} cy={y} rx={w / 2} ry="4" fill={b} />
                  <ellipse cx={w / 2 + 5} cy={y} rx={w / 2} ry="4" fill={b} />
                </g>
              );
            })}
          </g>
        );
      case 'lanceolate':
        return (
          <g>
            <path d="M60 40 Q 40 100 70 160" stroke={c} strokeWidth="2" fill="none" />
            <ellipse cx="50" cy="60" rx="8" ry="30" transform="rotate(-25 50 60)" fill={c} />
            <ellipse cx="55" cy="110" rx="8" ry="30" transform="rotate(-10 55 110)" fill={c} />
            <ellipse cx="75" cy="145" rx="8" ry="30" transform="rotate(20 75 145)" fill={c} />
            {[[110, 50], [130, 80], [120, 120]].map(([cx, cy], i) => (
              <g key={i} transform={`translate(${cx} ${cy})`}>
                {[0, 72, 144, 216, 288].map(deg => (
                  <ellipse key={deg} cx="0" cy="-12" rx="7" ry="11" fill={b} transform={`rotate(${deg})`} />
                ))}
                <circle r="4" fill={a} />
              </g>
            ))}
          </g>
        );
      default:
        return <circle cx="100" cy="100" r="70" fill={b} />;
    }
  };

  return (
    <div style={{
      width: size, height: size, borderRadius: rounded, overflow: 'hidden',
      background: plant.photo, position: 'relative', ...style,
    }}>
      <svg viewBox="0 0 200 200" width="100%" height="100%" style={{ display: 'block' }}>
        <defs>
          <radialGradient id={`glow-${id}`}>
            <stop offset="0%" stopColor="#fff" stopOpacity="0.15" />
            <stop offset="100%" stopColor="#fff" stopOpacity="0" />
          </radialGradient>
        </defs>
        <circle cx="60" cy="50" r="80" fill={`url(#glow-${id})`} />
        {renderShape()}
      </svg>
    </div>
  );
}
</script>

// Shrink an image to max 1568px on the long edge (Claude Vision's sweet spot) and return a JPEG data URL.
async function shrinkImage(file, maxDim = 1568, quality = 0.85) {
  const url = URL.createObjectURL(file);
  try {
    const img = await new Promise((res, rej) => {
      const i = new Image();
      i.onload = () => res(i);
      i.onerror = rej;
      i.src = url;
    });
    const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
    const w = Math.round(img.width * scale);
    const h = Math.round(img.height * scale);
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    return c.toDataURL('image/jpeg', quality);
  } finally {
    URL.revokeObjectURL(url);
  }
}

// Journal persistence
const JOURNAL_KEY = 'flora:journal:v1';
function loadJournal() {
  try { return JSON.parse(localStorage.getItem(JOURNAL_KEY) || '[]'); }
  catch { return []; }
}
function saveJournal(entries) {
  try { localStorage.setItem(JOURNAL_KEY, JSON.stringify(entries)); } catch {}
}
function addJournalEntry(entry) {
  const entries = loadJournal();
  entries.unshift({ ...entry, id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6) });
  // Cap at 50 to keep localStorage small
  saveJournal(entries.slice(0, 50));
  return entries;
}
</script>

<script type="text/babel">
function HomeScreen({ onCapture, onOpenJournal, recentCount }) {
  const [focusPoint, setFocusPoint] = React.useState({ x: 50, y: 50 });
  const [capturing, setCapturing] = React.useState(false);
  const [sheetOpen, setSheetOpen] = React.useState(false);
  const fileRef = React.useRef(null);
  const recentJournal = React.useMemo(() => loadJournal().slice(0, 3), [sheetOpen]);

  const handleViewfinderTap = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    setFocusPoint({
      x: ((e.clientX - rect.left) / rect.width) * 100,
      y: ((e.clientY - rect.top) / rect.height) * 100,
    });
  };

  const triggerCapture = () => {
    if (capturing) return;
    fileRef.current?.click();
  };

  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    e.target.value = ''; // allow reselect same file
    if (!file) return;
    setCapturing(true);
    try {
      const dataUrl = await shrinkImage(file);
      onCapture(dataUrl);
    } catch (err) {
      console.error('image processing failed', err);
      setCapturing(false);
      alert('Could not read that image. Try another.');
    }
  };

  return (
    <div style={{
      position: 'relative', width: '100%', height: '100%',
      background: THEME.bg, color: THEME.ink,
      fontFamily: FONTS.body, overflow: 'hidden',
    }}>
      {/* hidden capture input */}
      <input
        ref={fileRef} type="file" accept="image/*" capture="environment"
        onChange={handleFile}
        style={{ position: 'absolute', width: 0, height: 0, opacity: 0 }}
      />

      {/* Viewfinder */}
      <div
        onClick={handleViewfinderTap}
        style={{
          position: 'absolute', top: 0, left: 0, right: 0,
          height: '62%',
          background: `
            radial-gradient(ellipse at 30% 20%, ${THEME.accentGlow}66 0%, transparent 45%),
            radial-gradient(ellipse at 70% 60%, ${THEME.accent}88 0%, transparent 50%),
            linear-gradient(160deg, ${THEME.accentDeep} 0%, ${THEME.accent} 50%, ${THEME.accentGlow} 100%)
          `,
          overflow: 'hidden',
        }}
      >
        <svg width="100%" height="100%" viewBox="0 0 400 600" preserveAspectRatio="xMidYMid slice" style={{ position: 'absolute', inset: 0 }}>
          <defs><filter id="blur1"><feGaussianBlur stdDeviation="8" /></filter></defs>

function FocusReticle({ x, y, capturing }) {
  const s = capturing ? 140 : 110;
  return (
    <div style={{
      position: 'absolute', left: `${x}%`, top: `${y}%`,
      width: s, height: s, marginLeft: -s / 2, marginTop: -s / 2,
      pointerEvents: 'none',
      transition: 'all 300ms cubic-bezier(0.34, 1.5, 0.4, 1)',
    }}>
      <svg viewBox="0 0 100 100" width="100%" height="100%">
        {[[6, 6], [94, 6], [6, 94], [94, 94]].map(([cx, cy], i) => {
          const dx = cx < 50 ? 1 : -1;
          const dy = cy < 50 ? 1 : -1;
          return (
            <g key={i}>
              <line x1={cx} y1={cy} x2={cx + dx * 14} y2={cy} stroke="#fff" strokeWidth="2.5" strokeLinecap="round" />
              <line x1={cx} y1={cy} x2={cx} y2={cy + dy * 14} stroke="#fff" strokeWidth="2.5" strokeLinecap="round" />
            </g>
          );
        })}
        <circle cx="50" cy="50" r="3" fill="#fff" opacity="0.9" />
        <circle cx="50" cy="50" r="38" fill="none" stroke="#fff" strokeWidth="1.5"
          strokeDasharray={capturing ? "4 3" : "2 6"} opacity="0.5"
          style={{
            transformOrigin: '50px 50px',
            animation: capturing ? 'spin 1.2s linear infinite' : 'none',
          }} />
      </svg>
    </div>
  );
}
</script>

<!-- ============================================================
     SCREEN — SCAN (calls /api/identify while showing radar)
     ============================================================ -->
<script type="text/babel">
function ScanScreen({ photoUrl, onComplete, onError }) {
  const [progress, setProgress] = React.useState(0);
  const [detected, setDetected] = React.useState([]);
  const [statusLabel, setStatusLabel] = React.useState('Reading leaf shape…');

  React.useEffect(() => {
    let cancelled = false;
    const start = Date.now();

    // Animation loop — caps at 95% until the real response lands.
    let raf;
    const tick = () => {
      if (cancelled) return;
      const elapsed = (Date.now() - start) / 1000;
      const t = Math.min(0.95, elapsed / 8); // 8s max anim, caps at 95%
      setProgress(t);
      if (t >= 0.3 && detected.length < 1) setDetected([PLANTS[0].id]);
      if (t >= 0.55 && detected.length < 2) setDetected([PLANTS[0].id, PLANTS[2].id]);
      if (t >= 0.8 && detected.length < 3) setDetected([PLANTS[0].id, PLANTS[2].id, PLANTS[1].id]);
      setStatusLabel(
        t < 0.35 ? 'Reading leaf shape…'
          : t < 0.65 ? 'Matching venation…'
            : t < 0.9 ? 'Narrowing to species…'
              : 'Almost there.'
      );
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);

    // Fire the real identification call
    (async () => {
      try {
        const res = await fetch('/api/identify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: photoUrl }),
        });
        if (!res.ok) {
          const text = await res.text().catch(() => '');
          throw new Error(`Identify failed (${res.status}): ${text.slice(0, 200)}`);
        }
        const data = await res.json();
        if (cancelled) return;
        setProgress(1);
        setStatusLabel('Done.');
        // small delay to let user see 100%
        setTimeout(() => !cancelled && onComplete(data), 220);
      } catch (err) {
        if (cancelled) return;
        console.error(err);
        onError(err.message || 'Identification failed');
      }
    })();

    return () => { cancelled = true; cancelAnimationFrame(raf); };
  }, []);

  const matches = [
    { id: 'monstera', label: 'Aroid family', angle: -60 },
    { id: 'fern', label: 'Leaf texture', angle: 40 },
    { id: 'lavender', label: 'Vein pattern', angle: 140 },
  ];

  return (
    <div style={{
      width: '100%', height: '100%', position: 'relative',
      background: `radial-gradient(circle at 50% 35%, ${THEME.accentDeep}, ${THEME.ink})`,
      color: '#fff', fontFamily: FONTS.body, overflow: 'hidden',
    }}>
      {/* Blurred subject behind radar */}
      {photoUrl && (
        <div style={{
          position: 'absolute', inset: 0,
          background: `center/cover url(${photoUrl})`,
          filter: `blur(${(1 - progress) * 16 + 4}px) saturate(${0.3 + progress * 0.7})`,
          opacity: 0.35,
        }} />
      )}
      <div style={{
        position: 'absolute', inset: 0,
        background: `
          radial-gradient(ellipse at 30% 20%, ${THEME.accentGlow}44 0%, transparent 55%),
          radial-gradient(ellipse at 70% 60%, ${THEME.accent}66 0%, transparent 60%)
        `,
      }} />

      <div style={{
        position: 'relative', height: '60%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{ position: 'relative', width: 260, height: 260 }}>
          {[0, 1, 2].map(i => (
            <div key={i} style={{
              position: 'absolute', inset: 0, borderRadius: '50%',
              border: `1.5px solid ${THEME.accentGlow}66`,
              animation: `radarPulse 2s ${i * 0.5}s ease-out infinite`,
            }} />
          ))}
          <svg viewBox="0 0 260 260" width="260" height="260" style={{
            position: 'absolute', inset: 0,
            animation: 'spin 2.4s linear infinite',
          }}>
            <defs>
              <linearGradient id="scanbeam" x1="0" x2="1">
                <stop offset="0%" stopColor={THEME.accentGlow} stopOpacity="0" />
                <stop offset="100%" stopColor={THEME.accentGlow} stopOpacity="0.7" />
              </linearGradient>
            </defs>
            <path d="M130 130 L 260 130 A 130 130 0 0 0 130 0 Z" fill="url(#scanbeam)" />
          </svg>

          <div style={{
            position: 'absolute', inset: 55, borderRadius: '50%',
            background: photoUrl
              ? `center/cover url(${photoUrl})`
              : `radial-gradient(circle, ${THEME.accent}, ${THEME.accentDeep})`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: `0 0 40px ${THEME.accentGlow}66`,
            overflow: 'hidden',
          }}>
            {!photoUrl && <IconLeaf size={64} stroke="#fff" sw={1.5} />}
          </div>

          {matches.map((m, i) => {
            const visible = detected.includes(m.id);
            const rad = m.angle * Math.PI / 180;
            const r = 130;
            const x = 130 + Math.cos(rad) * r;
            const y = 130 + Math.sin(rad) * r;
            return (
              <div key={i} style={{
                position: 'absolute', left: x, top: y,
                width: 12, height: 12, marginLeft: -6, marginTop: -6,
                borderRadius: '50%', background: THEME.accentGlow,
                boxShadow: `0 0 0 4px ${THEME.accentGlow}33`,
                opacity: visible ? 1 : 0,
                transform: `scale(${visible ? 1 : 0.2})`,
                transition: 'all 400ms cubic-bezier(0.34, 1.6, 0.4, 1)',
              }}>
                <div style={{
                  position: 'absolute', left: x > 130 ? 18 : 'auto', right: x <= 130 ? 18 : 'auto',
                  top: -4, whiteSpace: 'nowrap',
                  background: 'rgba(255,255,255,0.15)',
                  backdropFilter: 'blur(10px)',
                  color: '#fff', padding: '4px 10px', borderRadius: 999,
                  fontSize: 11, fontWeight: 500,
                }}>{m.label}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{
        position: 'absolute', bottom: `calc(60px + env(safe-area-inset-bottom))`, left: 24, right: 24,
        textAlign: 'center',
      }}>
        <div style={{
          fontFamily: FONTS.heading, fontSize: 34, fontWeight: 500,
          letterSpacing: -0.5, marginBottom: 8,
        }}>{statusLabel}</div>
        <div style={{
          height: 3, background: 'rgba(255,255,255,0.15)', borderRadius: 3,
          overflow: 'hidden', maxWidth: 240, margin: '0 auto',
        }}>
          <div style={{
            height: '100%', width: `${progress * 100}%`,
            background: THEME.accentGlow, transition: 'width 0.2s',
          }} />
        </div>
        <div style={{ fontSize: 12, opacity: 0.6, marginTop: 10, letterSpacing: 0.5 }}>
          {Math.round(progress * 100)}%  •  {detected.length} matches
        </div>
      </div>
    </div>
  );
}
</script>

function Row({ label, value }) {

      display: 'flex', justifyContent: 'space-between', gap: 16,

      fontSize: 13,

function SectionTitle({ children }) {

function BloomStrip({ months }) {
  const letters = ['J', 'F', 'M', 'A', 'M', 'J', 'J', 'A', 'S', 'O', 'N', 'D'];
  return (
    <div style={{ display: 'flex', gap: 4 }}>
      {letters.map((L, i) => {
        const active = (months || []).includes(i + 1);
        return (
          <div key={i} style={{
            flex: 1, height: 36, borderRadius: 6,
            background: active ? THEME.accent : THEME.surface,
            color: active ? '#fff' : THEME.inkMuted,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 11, fontWeight: 700,
            boxShadow: active ? 'none' : `inset 0 0 0 1px ${THEME.accentSoft}`,
          }}>{L}</div>

      })}

  );
}

function CareTab({ plant }) {

    { icon: <IconDrop size={22} stroke={THEME.accent} />, label: 'Water', value: care.water || '—' },

function SimilarTab({ plant }) {

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      {sims.map((p, i) => (
        <div key={i} style={{

    </div>

}
</script>

<script type="text/babel">
function JournalScreen({ onBack, onSelect }) {
  const [entries, setEntries] = React.useState(() => loadJournal());

  const removeEntry = (id) => {
    const next = entries.filter(e => e.id !== id);
    setEntries(next);
    saveJournal(next);
  };

  const safeCount = entries.filter(e => (e.plant?.toxicity?.level || 'unknown') === 'safe').length;
  const speciesCount = new Set(entries.map(e => e.plant?.id || e.plantId)).size;

  return (
    <div style={{
      width: '100%', height: '100%', background: THEME.bg,
      color: THEME.ink, fontFamily: FONTS.body,
      display: 'flex', flexDirection: 'column', overflow: 'hidden',
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10,
        padding: `calc(16px + env(safe-area-inset-top)) 16px 10px`,
      }}>
        <button onClick={onBack} style={{
          width: 40, height: 40, borderRadius: '50%',
          background: THEME.surface, boxShadow: THEME.shadow,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}><IconBack size={18} stroke={THEME.ink} /></button>
        <div style={{ flex: 1 }}>
          <div style={{
            fontFamily: FONTS.heading, fontSize: 32, fontWeight: 500,
            letterSpacing: -0.3, lineHeight: 1,
          }}>My field journal</div>
          <div style={{ fontSize: 12, color: THEME.inkMuted, marginTop: 2 }}>
            {entries.length} {entries.length === 1 ? 'entry' : 'entries'}
          </div>
        </div>
      </div>

      <div style={{
        display: 'flex', gap: 8, padding: '0 16px 14px', overflowX: 'auto',
        flexShrink: 0,
      }}>
        {['All', 'Pet safe', 'Flowering now', 'Near me', 'Toxic'].map((f, i) => (
          <button key={f} style={{
            padding: '8px 14px', borderRadius: 999, flexShrink: 0,
            background: i === 0 ? THEME.accent : THEME.surface,
            color: i === 0 ? '#fff' : THEME.ink,
            fontSize: 13, fontWeight: 600,
            boxShadow: i === 0 ? 'none' : THEME.shadow,
          }}>{f}</button>
        ))}
      </div>

      <div style={{ display: 'flex', gap: 10, padding: '0 16px 14px', flexShrink: 0 }}>

      <div style={{ flex: 1, overflow: 'auto', padding: '0 16px calc(20px + env(safe-area-inset-bottom))' }}>
        {entries.length === 0 ? (
          <div style={{
            textAlign: 'center', color: THEME.inkMuted, fontSize: 14,

              background: THEME.surface, borderRadius: THEME.radiusSm,

<script type="text/babel">
function normaliseMatch(m) {
  // Claude returns structured data matching this shape. Defensive defaults for anything missing.
  const tox = (m.toxicity?.level || 'unknown').toLowerCase();
  const plant = {
    id: m.id || (m.name || 'unknown').toLowerCase().replace(/\s+/g, '-'),
    name: m.scientific_name || m.name || 'Unknown species',
    common: m.common_name || m.name || 'Unknown',
    family: m.family || '—',
    colors: pickColors(tox),
    photo: 'linear-gradient(135deg, #1f3a28 0%, #2d5a3d 35%, #4a7c5a 70%, #8cb89a 100%)',
    leafShape: pickLeafShape(m.common_name || m.name),
    tagline: m.tagline || m.description || '',
    native: m.native_range || m.native || '—',
    habitat: m.habitat || '—',
    bloom: {
      months: Array.isArray(m.bloom?.months) ? m.bloom.months : [],
      label: m.bloom?.label || m.bloom_label || 'Not specified',
    },
    toxicity: {
      level: tox === 'safe' || tox === 'toxic' || tox === 'severe' ? tox : 'unknown',
      note: m.toxicity?.note || 'No toxicity information.',
    },
    edibility: m.edibility || '—',
    care: {
      light: m.care?.light || '—',
      water: m.care?.water || '—',
      humidity: m.care?.humidity || '—',
      temp: m.care?.temperature || m.care?.temp || '—',
    },
    nearby: m.nearby ?? null,
    tags: m.tags || [],
    similarDetail: [],
  };
  return {
    plant,
    conf: typeof m.confidence === 'number' ? m.confidence : 0.8,
  };
}

function FloraApp() {
  const [screen, setScreen] = React.useState('home');
  const [photoUrl, setPhotoUrl] = React.useState(null);
  const [matches, setMatches] = React.useState([]);
  const [activePlant, setActivePlant] = React.useState(null);
  const [journalVersion, setJournalVersion] = React.useState(0);

  const recentCount = React.useMemo(() => loadJournal().length, [journalVersion]);

  const startScan = (dataUrl) => {
    setPhotoUrl(dataUrl);
    setMatches([]);
    setScreen('scan');
  };

  const onScanComplete = (data) => {
    const normalised = (data.matches || []).map(normaliseMatch);
    setMatches(normalised);
    setScreen('results');
  };

  const onScanError = (msg) => {
    alert('Sorry — ' + msg);
    setScreen('home');
  };

  const onSaveMatch = (match) => {
    const entry = {
      plant: match.plant,
      photoUrl,
      date: new Date().toLocaleDateString(undefined, { month: 'short', day: 'numeric' }),
      location: 'Captured here',
      note: match.plant.tagline || '',
    };
    addJournalEntry(entry);
    setJournalVersion(v => v + 1);
  };

  const openDetail = (matchOrEntry) => {
    // Accept either a ResultsScreen match {plant, conf} or a Journal entry {plant, photoUrl, ...}
    setActivePlant(matchOrEntry.plant);
    if (matchOrEntry.photoUrl) setPhotoUrl(matchOrEntry.photoUrl);
    setScreen('detail');
  };

  const backFromDetail = () => {
    // If we came from journal, go back to journal. Else results.
    setScreen(matches.length ? 'results' : 'journal');
  };

  return (
    <div style={{ width: '100%', height: '100%' }}>
      {screen === 'home' && (
        <HomeScreen
          onCapture={startScan}
          onOpenJournal={() => setScreen('journal')}
          recentCount={recentCount}
        />
      )}
      {screen === 'scan' && (
        <ScanScreen
          photoUrl={photoUrl}
          onComplete={onScanComplete}
          onError={onScanError}
        />
      )}
      {screen === 'results' && (
        <ResultsScreen
          photoUrl={photoUrl}
          matches={matches}
          onBack={() => setScreen('home')}
          onSelect={openDetail}
          onSave={onSaveMatch}
        />
      )}
      {screen === 'detail' && (
        <DetailScreen
          plant={activePlant}
          photoUrl={photoUrl}
          onBack={backFromDetail}
        />
      )}
      {screen === 'journal' && (
        <JournalScreen
          onBack={() => setScreen('home')}
          onSelect={openDetail}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<FloraApp />);
</script>
