const LEAF_SHAPES = ['fenestrated', 'linear', 'pinnate', 'lanceolate'];
const pickLeafShape = (name = '') => {
  const n = name.toLowerCase();
  if (/monstera|philodendron|aroid/.test(n)) return 'fenestrated';
  if (/lavender|grass|reed|iris/.test(n)) return 'linear';
  if (/fern|palm|cycad/.test(n)) return 'pinnate';
  return 'lanceolate';
};
const pickColors = (tox) => {
  if (tox === 'severe') return ['#a83d5a', '#d46880', '#f0b0c0'];
  if (tox === 'toxic')  return ['#8a5a2b', '#b88a4f', '#e0c49a'];
  return ['#2d5a3d', '#4a7c5a', '#8cb89a'];
};

// ── iNaturalist + geolocation ──────────────────────────────
const INAT_BASE = 'https://api.inaturalist.org/v1';

// Cache the geolocation prompt so we only ask once per page session.
let __geoPromise = null;
function getGeo() {
  if (__geoPromise) return __geoPromise;
  __geoPromise = new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error('Geolocation not supported'));
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      (err) => reject(new Error(err.message || 'Location denied')),
      { timeout: 10000, maximumAge: 10 * 60 * 1000, enableHighAccuracy: false }
    );
  });
  return __geoPromise;
}

// Shape an iNat taxon into a Flora plant-like object.
function taxonToPlant(taxon, photoUrl) {
  return {
    id: 't' + taxon.id,
    taxonId: taxon.id,
    name: taxon.name,
    common: taxon.preferred_common_name || taxon.name,
    family: '—',
    colors: ['#2d5a3d', '#4a7c5a', '#8cb89a'],
    photo: 'linear-gradient(135deg, #1f3a28 0%, #2d5a3d 35%, #4a7c5a 70%, #8cb89a 100%)',
    photoUrl,
    leafShape: pickLeafShape(taxon.preferred_common_name || taxon.name),
    tagline: '',
    native: '—', habitat: '—', edibility: '—',
    bloom: { months: [], label: '—' },
    toxicity: { level: 'unknown', note: 'Toxicity not determined from iNaturalist data.' },
    care: { light: '—', water: '—', humidity: '—', temp: '—' },
    nearby: null, tags: [],
  };
}

async function inatNearbyPlants(lat, lng) {
  const url = new URL(INAT_BASE + '/observations');
  url.searchParams.set('taxon_id', '47126'); // Plantae
  url.searchParams.set('lat', String(lat));
  url.searchParams.set('lng', String(lng));
  url.searchParams.set('radius', '25');
  url.searchParams.set('per_page', '30');
  url.searchParams.set('photos', 'true');
  url.searchParams.set('quality_grade', 'research');
  url.searchParams.set('order_by', 'observed_on');
  url.searchParams.set('order', 'desc');
  const res = await fetch(url);
  if (!res.ok) throw new Error('iNaturalist ' + res.status);
  const data = await res.json();
  const seen = new Set();
  const out = [];
  for (const obs of (data.results || [])) {
    const t = obs.taxon;
    if (!t || seen.has(t.id)) continue;
    seen.add(t.id);
    const raw = obs.photos?.[0]?.url || null;
    const photo = raw ? raw.replace('square', 'medium') : null;
    out.push(taxonToPlant(t, photo));
    if (out.length >= 10) break;
  }
  return out;
}

async function inatLookupTaxonId(scientificName) {
  if (!scientificName) return null;
  const url = new URL(INAT_BASE + '/taxa');
  url.searchParams.set('q', scientificName);
  url.searchParams.set('per_page', '1');
  const res = await fetch(url);
  if (!res.ok) return null;
  const data = await res.json();
  return data.results?.[0]?.id || null;
}

async function inatObservationsForTaxon(taxonId, lat, lng, radiusKm = 50) {
  const url = new URL(INAT_BASE + '/observations');
  url.searchParams.set('taxon_id', String(taxonId));
  url.searchParams.set('lat', String(lat));
  url.searchParams.set('lng', String(lng));
  url.searchParams.set('radius', String(radiusKm));
  url.searchParams.set('per_page', '100');
  const res = await fetch(url);
  if (!res.ok) throw new Error('iNaturalist ' + res.status);
  return res.json();
}

     FLORA IMAGE — SVG illustration or real photo

<script type="text/babel">
function FloraImage({ plant, size = 200, style = {}, rounded = 24, photoUrl }) {
  // If a real photo exists, show it.
  if (photoUrl) {
    return (
      <div style={{
        width: size, height: size, borderRadius: rounded, overflow: 'hidden',
        background: `#000 center/cover url(${photoUrl})`, position: 'relative',
        ...style,
      }} />
    );
  }

  const { leafShape, colors, id } = plant;
  const [a, b, c] = colors;

  const renderShape = () => {
    switch (leafShape) {
      case 'fenestrated':
        return (
          <g>
            <path d="M50 80 Q 20 50 30 20 Q 60 5 90 15 Q 130 30 140 70 Q 150 130 120 160 Q 85 180 55 160 Q 25 140 50 80 Z" fill={b} />
            <ellipse cx="70" cy="60" rx="8" ry="15" fill={a} opacity="0.55" />
            <ellipse cx="95" cy="80" rx="10" ry="18" fill={a} opacity="0.55" />
            <ellipse cx="75" cy="110" rx="9" ry="14" fill={a} opacity="0.55" />
            <ellipse cx="105" cy="130" rx="7" ry="12" fill={a} opacity="0.55" />
            <path d="M85 20 L 85 170" stroke={a} strokeWidth="2" opacity="0.6" />
          </g>
        );
      case 'linear':
        return (
          <g>
            {[0, 1, 2].map(i => (
              <g key={i} transform={`translate(${50 + i * 30}, 30) rotate(${-10 + i * 10})`}>
                <rect x="0" y="40" width="3" height="100" fill={a} />
                {[0, 1, 2, 3, 4, 5].map(j => (
                  <ellipse key={j} cx="1.5" cy={40 + j * 8} rx="7" ry="5" fill={b} opacity={0.85 - j * 0.08} />
                ))}
              </g>
            ))}
          </g>
        );
      case 'pinnate':
        return (
          <g transform="translate(100, 20)">
            <path d="M0 0 Q -5 80 0 160" stroke={a} strokeWidth="2.5" fill="none" />
            {Array.from({ length: 12 }).map((_, i) => {
              const y = 10 + i * 12;
              const w = 35 - Math.abs(i - 5) * 3;
              return (
                <g key={i}>
                  <ellipse cx={-w / 2 - 5} cy={y} rx={w / 2} ry="4" fill={b} />
                  <ellipse cx={w / 2 + 5} cy={y} rx={w / 2} ry="4" fill={b} />
                </g>
              );
            })}
          </g>
        );
      case 'lanceolate':
        return (
          <g>
            <path d="M60 40 Q 40 100 70 160" stroke={c} strokeWidth="2" fill="none" />
            <ellipse cx="50" cy="60" rx="8" ry="30" transform="rotate(-25 50 60)" fill={c} />
            <ellipse cx="55" cy="110" rx="8" ry="30" transform="rotate(-10 55 110)" fill={c} />
            <ellipse cx="75" cy="145" rx="8" ry="30" transform="rotate(20 75 145)" fill={c} />
            {[[110, 50], [130, 80], [120, 120]].map(([cx, cy], i) => (
              <g key={i} transform={`translate(${cx} ${cy})`}>
                {[0, 72, 144, 216, 288].map(deg => (
                  <ellipse key={deg} cx="0" cy="-12" rx="7" ry="11" fill={b} transform={`rotate(${deg})`} />
                ))}
                <circle r="4" fill={a} />
              </g>
            ))}
          </g>
        );
      default:
        return <circle cx="100" cy="100" r="70" fill={b} />;
    }
  };

  return (
    <div style={{
      width: size, height: size, borderRadius: rounded, overflow: 'hidden',
      background: plant.photo, position: 'relative', ...style,
    }}>
      <svg viewBox="0 0 200 200" width="100%" height="100%" style={{ display: 'block' }}>
        <defs>
          <radialGradient id={`glow-${id}`}>
            <stop offset="0%" stopColor="#fff" stopOpacity="0.15" />
            <stop offset="100%" stopColor="#fff" stopOpacity="0" />
          </radialGradient>
        </defs>
        <circle cx="60" cy="50" r="80" fill={`url(#glow-${id})`} />
        {renderShape()}
      </svg>
    </div>
  );
}
</script>

<script type="text/babel">
function ToxBadge({ tox, small }) {
  const map = {
    safe:   { bg: '#3a7a3a', label: 'Pet safe', icon: '🐾' },
    toxic:  { bg: '#d47a2a', label: 'Toxic',    icon: '⚠' },
    severe: { bg: '#c94a3a', label: 'Severe',   icon: '☠' },
    unknown:{ bg: '#6B6655', label: 'Unknown',  icon: '?' },
  };
  const m = map[tox] || map.unknown;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      background: m.bg, color: '#fff',
      padding: small ? '2px 7px' : '4px 9px', borderRadius: 999,
      fontSize: small ? 10 : 11, fontWeight: 600,
    }}>{m.icon} {m.label}</span>
  );
}

function GlassChip({ children, onClick }) {
  return (
    <button onClick={onClick} style={{
      display: 'flex', alignItems: 'center', gap: 6,
      padding: '8px 14px', borderRadius: 999,
      background: 'rgba(255,255,255,0.75)',
      backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)',
      border: '1px solid rgba(255,255,255,0.4)',
      cursor: 'pointer',
    }}>{children}</button>
  );
}

function NearbyCard({ plant, onClick }) {
  const bg = plant.photoUrl
    ? `center/cover url(${plant.photoUrl})`
    : plant.photo;
  return (
    <div onClick={onClick} style={{
      flexShrink: 0, width: 130, height: 170, borderRadius: THEME.radiusSm,
      background: bg, color: '#fff', position: 'relative',
      overflow: 'hidden', display: 'flex', flexDirection: 'column', justifyContent: 'flex-end',
      padding: 10, cursor: onClick ? 'pointer' : 'default',
    }}>
      <div style={{
        position: 'absolute', inset: 0,
        background: 'linear-gradient(180deg, transparent 45%, rgba(0,0,0,0.7))',
      }} />
      <div style={{ position: 'relative', zIndex: 1 }}>
        {plant.toxicity?.level && plant.toxicity.level !== 'unknown' && (
          <ToxBadge tox={plant.toxicity.level} small />
        )}
        <div style={{ fontFamily: FONTS.heading, fontSize: 17, fontWeight: 600, marginTop: 4, lineHeight: 1.05 }}>
          {plant.common}
        </div>
        <div style={{ fontSize: 10, opacity: 0.85, fontStyle: 'italic', lineHeight: 1.15 }}>{plant.name}</div>
      </div>
    </div>
  );
}

function CategoryChip({ category, size = 'sm' }) {
  if (!category) return null;

// Shrink an image to max 1568px on the long edge (Claude Vision's sweet spot) and return a JPEG data URL.
async function shrinkImage(file, maxDim = 1568, quality = 0.85) {
  const url = URL.createObjectURL(file);
  try {
    const img = await new Promise((res, rej) => {
      const i = new Image();
      i.onload = () => res(i);
      i.onerror = rej;
      i.src = url;
    });
    const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
    const w = Math.round(img.width * scale);
    const h = Math.round(img.height * scale);
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    return c.toDataURL('image/jpeg', quality);
  } finally {
    URL.revokeObjectURL(url);
  }
}

// Camera preference (remembered per-phone via localStorage)
const CAM_PREF_KEY = 'flora:cameraDeviceId:v1';
function getSavedCameraId() {
  try { return localStorage.getItem(CAM_PREF_KEY) || null; } catch { return null; }
}
function saveCameraId(id) {
  try { id ? localStorage.setItem(CAM_PREF_KEY, id) : localStorage.removeItem(CAM_PREF_KEY); } catch {}
}

// Journal persistence — backed by Cloudflare D1 + R2.
// Device ID is an anonymous client-generated key that scopes what this
// device can read / write / delete. Stored only in localStorage.

const DEVICE_ID_KEY = 'flora:device_id:v1';
function getDeviceId() {
  let id = null;
  try { id = localStorage.getItem(DEVICE_ID_KEY); } catch {}
  if (!id) {
    id = (typeof crypto !== 'undefined' && crypto.randomUUID)
      ? crypto.randomUUID()
      : 'd-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 14);
    try { localStorage.setItem(DEVICE_ID_KEY, id); } catch {}
  }
  return id;
}

// Downscale a base64 image data URL to at most `maxDim` on the longer edge
// and re-encode as JPEG. Typical ~2 MB phone photo collapses to ~80–150 KB,
// well under the server's MAX_PHOTO_BYTES cap.
function downscalePhoto(dataUrl, maxDim = 1024, quality = 0.72) {
  return new Promise((resolve, reject) => {
    if (!dataUrl) return resolve(null);
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.naturalWidth, img.naturalHeight));
      const w = Math.max(1, Math.round(img.naturalWidth * scale));
      const h = Math.max(1, Math.round(img.naturalHeight * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      try { resolve(canvas.toDataURL('image/jpeg', quality)); }
      catch (e) { reject(e); }
    };
    img.onerror = () => reject(new Error('Image decode failed'));
    img.src = dataUrl;
  });
}

async function apiSaveEntry({ plant, photoUrl, date, location, coords, note }) {
  const device_id = getDeviceId();
  const image = photoUrl ? await downscalePhoto(photoUrl) : null;
  const res = await fetch('/api/journal', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ device_id, plant, date, location, coords, note, image }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `Save failed (${res.status})`);
  }
  return res.json();
}

async function apiListEntries() {
  const device_id = getDeviceId();
  const res = await fetch(`/api/journal?device_id=${encodeURIComponent(device_id)}`);
  if (!res.ok) throw new Error(`Load failed (${res.status})`);
  const data = await res.json();
  return Array.isArray(data.entries) ? data.entries : [];
}

async function apiDeleteEntry(id) {
  const device_id = getDeviceId();
  const res = await fetch(`/api/journal/${encodeURIComponent(id)}?device_id=${encodeURIComponent(device_id)}`, {
    method: 'DELETE',
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `Delete failed (${res.status})`);
  }
  return res.json();
}

// Prefer the server-side createdAt (unix ms) so we can show both date and
// time consistently. Falls back to the optimistic entry's `date` string
// while a save is still in flight.
function formatEntryTime(entry) {
  if (entry && typeof entry.createdAt === 'number') {
    return new Date(entry.createdAt).toLocaleString(undefined, {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',
    });
  }
  return (entry && entry.date) || '';
}

<!-- ============================================================
     SCREEN — HOME (camera capture)
     ============================================================ -->
<script type="text/babel">
const PART_PREF_KEY = 'flora:capture_part:v1';
const CAPTURE_PARTS = [
  { id: 'leaf', label: 'leaf' },
  { id: 'whole', label: 'whole plant' },
  { id: 'bark', label: 'bark' },
  { id: 'flower', label: 'flower' },
];

function HomeScreen({ onCapture, onOpenJournal, onOpenMap, recentCount, recentEntries, onSelectPlant }) {
  const [capturing, setCapturing] = React.useState(false);
  const [sheetOpen, setSheetOpen] = React.useState(false);
  const [dragDelta, setDragDelta] = React.useState(0);
  const dragStartY = React.useRef(null);
  const [nearby, setNearby] = React.useState(null); // null = loading, [] = empty/denied, [...] = data
  const [nearbyErr, setNearbyErr] = React.useState(null);
  const fileRef = React.useRef(null);
  const recentJournal = recentEntries || [];
  const [selectedPart, setSelectedPartRaw] = React.useState(() => {
    try { return localStorage.getItem(PART_PREF_KEY) || 'whole'; }
    catch { return 'whole'; }
  });
  const setSelectedPart = (p) => {
    setSelectedPartRaw(p);
    try { localStorage.setItem(PART_PREF_KEY, p); } catch {}
  };

  const onHandleTouchStart = (e) => {
    dragStartY.current = e.touches[0].clientY;
  };
  const onHandleTouchMove = (e) => {
    if (dragStartY.current == null) return;
    e.preventDefault();
    setDragDelta(dragStartY.current - e.touches[0].clientY);
  };
  const onHandleTouchEnd = () => {
    if (dragStartY.current == null) return;
    dragStartY.current = null;
    const THRESH = 50;
    if (dragDelta > THRESH) setSheetOpen(true);
    else if (dragDelta < -THRESH) setSheetOpen(false);
    setDragDelta(0);
  };

  const baseHeightPct = sheetOpen ? 78 : 38;
  const viewportH = typeof window !== 'undefined' ? window.innerHeight : 800;
  const liveHeightPct = Math.max(30, Math.min(92, baseHeightPct + (dragDelta / viewportH) * 100));

  // ── Live camera feed ───────────────────────────────
  const videoRef = React.useRef(null);
  const streamRef = React.useRef(null);
  const [cameraReady, setCameraReady] = React.useState(false);
  const [cameraErr, setCameraErr] = React.useState(null);
  const [cameras, setCameras] = React.useState([]); // enumerated videoinput devices
  const [activeCameraIdx, setActiveCameraIdx] = React.useState(0);
  const [debugOpen, setDebugOpen] = React.useState(false);
  const [debugInfo, setDebugInfo] = React.useState(null);

  // Start or restart the camera stream with a specific deviceId (or facingMode on first run)
  const startStream = React.useCallback(async (deviceId) => {
    // Stop any existing stream
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
    setCameraReady(false);

    const constraints = deviceId
      ? { video: { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false }
      : { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false };

    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    streamRef.current = stream;
    if (videoRef.current) {
      videoRef.current.srcObject = stream;
      videoRef.current.play().catch(() => {});
    }

    const track = stream.getVideoTracks()[0];
    let caps = {}, settings = {};
    try {
      caps = track.getCapabilities ? track.getCapabilities() : {};
      settings = track.getSettings ? track.getSettings() : {};
      const advanced = [];
      if (caps.focusMode?.includes('continuous')) advanced.push({ focusMode: 'continuous' });
      if (caps.zoom) advanced.push({ zoom: caps.zoom.min ?? 1 });
      if (caps.whiteBalanceMode?.includes('continuous')) advanced.push({ whiteBalanceMode: 'continuous' });
      if (caps.exposureMode?.includes('continuous')) advanced.push({ exposureMode: 'continuous' });
      if (advanced.length) await track.applyConstraints({ advanced });
    } catch (e) {
      console.warn('[flora] constraint tuning failed', e);
    }

    setCameraReady(true);
    setDebugInfo({
      label: track.label,
      deviceId: settings.deviceId,
      settings: track.getSettings?.() ?? settings,
      caps,
    });
  }, []);

  React.useEffect(() => {
    let cancelled = false;

    (async () => {
      try {
        if (!navigator.mediaDevices?.getUserMedia) throw new Error('Camera API not available');
        await startStream(null); // initial — grants permission

        // Enumerate after permission (labels only populate post-grant)
        const devices = await navigator.mediaDevices.enumerateDevices();
        if (cancelled) return;
        const videoIns = devices.filter(d => d.kind === 'videoinput');
        setCameras(videoIns);

        // Preference order:
        //   1. deviceId saved from a previous cycle (works across loads on same phone)
        //   2. index 4 (Huawei P30 Pro back-wide)
        //   3. whatever facingMode: environment already picked
        const savedId = getSavedCameraId();
        let targetIdx = -1;
        if (savedId) targetIdx = videoIns.findIndex(d => d.deviceId === savedId);
        if (targetIdx < 0 && videoIns[4]) targetIdx = 4;

        if (targetIdx >= 0) {
          setActiveCameraIdx(targetIdx);
          try { await startStream(videoIns[targetIdx].deviceId); }
          catch (e) { console.warn('[flora] could not switch to preferred camera', e); }
        } else {
          const curId = streamRef.current?.getVideoTracks()[0]?.getSettings().deviceId;
          const idx = videoIns.findIndex(d => d.deviceId === curId);
          if (idx >= 0) setActiveCameraIdx(idx);
        }
      } catch (e) {
        if (!cancelled) setCameraErr(e.message || 'Camera unavailable');
      }
    })();

    return () => {
      cancelled = true;
      if (streamRef.current) {
        streamRef.current.getTracks().forEach(t => t.stop());
        streamRef.current = null;
      }
    };
  }, [startStream]);

  const cycleCamera = async () => {
    if (cameras.length < 2) return;
    const next = (activeCameraIdx + 1) % cameras.length;
    setActiveCameraIdx(next);
    try {
      await startStream(cameras[next].deviceId);
      saveCameraId(cameras[next].deviceId);
    } catch (e) {
      console.warn('Camera switch failed', e);
    }
  };

  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const { lat, lng } = await getGeo();
        const plants = await inatNearbyPlants(lat, lng);
        if (!cancelled) setNearby(plants);
      } catch (e) {
        if (!cancelled) { setNearbyErr(e.message || 'Location unavailable'); setNearby([]); }
      }
    })();
    return () => { cancelled = true; };
  }, []);

  const triggerCapture = async () => {
    if (capturing) return;
    // Prefer grabbing a frame from the live stream
    const video = videoRef.current;
    if (streamRef.current && video && video.videoWidth > 0) {
      setCapturing(true);
      try {
        const canvas = document.createElement('canvas');
        const maxDim = 1568;
        const scale = Math.min(1, maxDim / Math.max(video.videoWidth, video.videoHeight));
        canvas.width = Math.round(video.videoWidth * scale);
        canvas.height = Math.round(video.videoHeight * scale);
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        // Brief visual pause so the capture button animation reads
        setTimeout(() => onCapture(dataUrl, selectedPart), 220);
      } catch (err) {
        console.error('Canvas capture failed', err);
        setCapturing(false);
        alert('Capture failed. Try the file picker instead.');
      }
      return;
    }
    // Fallback: native file picker / camera intent
    fileRef.current?.click();
  };

  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    e.target.value = ''; // allow reselect same file
    if (!file) return;
    setCapturing(true);
    try {
      const dataUrl = await shrinkImage(file);
      onCapture(dataUrl, selectedPart);
    } catch (err) {
      console.error('image processing failed', err);
      setCapturing(false);
      alert('Could not read that image. Try another.');
    }
  };

  return (
    <div style={{
      position: 'relative', width: '100%', height: '100%',
      background: THEME.bg, color: THEME.ink,
      fontFamily: FONTS.body, overflow: 'hidden',
    }}>
      {/* hidden capture input */}
      <input
        ref={fileRef} type="file" accept="image/*" capture="environment"
        onChange={handleFile}
        style={{ position: 'absolute', width: 0, height: 0, opacity: 0 }}
      />

      {/* Viewfinder — live camera feed, with gradient fallback */}
      <div
        style={{
          position: 'absolute', top: 0, left: 0, right: 0,
          height: '62%',
          background: `
            radial-gradient(ellipse at 30% 20%, ${THEME.accentGlow}66 0%, transparent 45%),
            radial-gradient(ellipse at 70% 60%, ${THEME.accent}88 0%, transparent 50%),
            linear-gradient(160deg, ${THEME.accentDeep} 0%, ${THEME.accent} 50%, ${THEME.accentGlow} 100%)
          `,
          overflow: 'hidden',
        }}
      >
        {/* Live video feed — fades in when ready, full frame (WYSIWYG) with
            gradient bleeding through the letterbox areas. */}
        <video
          ref={videoRef}
          autoPlay playsInline muted
          style={{
            position: 'absolute', inset: 0, width: '100%', height: '100%',
            objectFit: 'contain',
            opacity: cameraReady ? 1 : 0,
            transition: 'opacity 400ms ease-out',
          }}
        />


        {/* Top overlay — safe-area respecting */}
        <div style={{
          position: 'absolute', top: `calc(16px + env(safe-area-inset-top))`, left: 0, right: 0,
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          padding: '0 16px', zIndex: 10, gap: 8,
        }}>
          <GlassChip onClick={onOpenJournal}>
            <IconBook size={16} stroke={THEME.ink} />
            <span style={{ fontSize: 13, fontWeight: 600, color: THEME.ink }}>Journal</span>
          </GlassChip>
          <div style={{ display: 'flex', gap: 8 }}>
            {cameras.length > 1 && (
              <GlassChip onClick={cycleCamera}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={THEME.ink} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M23 4v6h-6M1 20v-6h6" />
                  <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
                </svg>
                <span style={{ fontSize: 11, fontWeight: 700, color: THEME.ink }}>{activeCameraIdx + 1}/{cameras.length}</span>
              </GlassChip>
            )}
            <GlassChip onClick={() => setDebugOpen(!debugOpen)}>
              <span style={{ fontSize: 13, fontWeight: 700, color: THEME.ink, lineHeight: 1 }}>ⓘ</span>
            </GlassChip>
          </div>
        </div>

        {/* Debug panel — camera diagnostics */}
        {debugOpen && (
          <div style={{
            position: 'absolute',
            top: `calc(70px + env(safe-area-inset-top))`,
            left: 12, right: 12, zIndex: 20,
            background: 'rgba(0,0,0,0.82)', color: '#fff',
            backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)',
            padding: 12, borderRadius: 14,
            fontSize: 11, lineHeight: 1.5,
            fontFamily: "ui-monospace, SFMono-Regular, monospace",
            maxHeight: '60%', overflow: 'auto',
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
              <strong>Camera debug</strong>
              <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                <button onClick={() => saveCameraId(null)} style={{ color: '#fff', opacity: 0.7, fontSize: 11, padding: '2px 6px', border: '1px solid rgba(255,255,255,0.25)', borderRadius: 4 }}>reset pref</button>
                <button onClick={() => setDebugOpen(false)} style={{ color: '#fff', fontSize: 14, fontWeight: 700, padding: '0 6px' }}>×</button>
              </div>
            </div>
            <div style={{ opacity: 0.7, marginBottom: 4 }}>Active: [{activeCameraIdx}] camera {activeCameraIdx}</div>
            {debugInfo?.settings && (
              <div>
                res: {debugInfo.settings.width}×{debugInfo.settings.height}
                {debugInfo.settings.frameRate ? ` @${Math.round(debugInfo.settings.frameRate)}fps` : ''}
                {debugInfo.settings.zoom != null ? ` · zoom ${debugInfo.settings.zoom}×` : ''}
              </div>
            )}
            {debugInfo?.caps?.zoom && (
              <div>zoom range: {debugInfo.caps.zoom.min}–{debugInfo.caps.zoom.max} (step {debugInfo.caps.zoom.step})</div>
            )}
            {debugInfo?.caps?.focusMode && (

            {cameras.map((c, i) => (

                padding: '4px 6px', marginTop: 2, borderRadius: 4,
                background: i === activeCameraIdx ? 'rgba(168,215,140,0.25)' : 'transparent',
                cursor: 'pointer',

        <div style={{

        </div>
      </div>

      {/* Lower panel — drag handle up/down or tap to toggle */}
      <div style={{

        <button

            padding: '14px 0 8px', width: '100%',
            display: 'flex', justifyContent: 'center', alignItems: 'center',
            cursor: 'grab', background: 'transparent',
            touchAction: 'none',
          }}
        >
          <div style={{
            width: 56, height: 5, borderRadius: 3,
            background: THEME.inkMuted, opacity: sheetOpen ? 0.55 : 0.35,
            transition: 'opacity 200ms',
          }} />
        </button>

        {/* Capture controls */}
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '8px 28px 16px',
        }}>
          {/* Gallery thumb — shows most recent journal entry */}
          <button onClick={onOpenJournal} style={{
            width: 48, height: 48, borderRadius: THEME.radiusSm,
            border: `2px solid ${THEME.accentSoft}`,
            background: recentJournal[0]?.photoUrl
              ? `center/cover url(${recentJournal[0].photoUrl})`
              : `linear-gradient(135deg, ${PLANTS[0].colors[1]}, ${PLANTS[0].colors[2]})`,
            cursor: 'pointer', position: 'relative', overflow: 'hidden',
          }}>
            {recentCount > 0 && (
              <div style={{
                position: 'absolute', bottom: 2, right: 2,
                background: THEME.ink, color: THEME.bg, fontSize: 9, fontWeight: 700,
                borderRadius: 999, padding: '2px 6px',
              }}>{recentCount}</div>
            )}
          </button>

          <button
            onClick={triggerCapture}
            style={{
              width: 86, height: 86, borderRadius: '50%',
              cursor: 'pointer', padding: 0,
              background: 'transparent', position: 'relative',
            }}
          >
            <svg width="86" height="86" viewBox="0 0 86 86" style={{ position: 'absolute', inset: 0 }}>
              <circle cx="43" cy="43" r="40" fill="none" stroke={THEME.accentSoft} strokeWidth="2" />
              <circle cx="43" cy="43" r="40" fill="none" stroke={THEME.accent} strokeWidth="2.5"
                strokeDasharray="4 10" opacity={capturing ? 1 : 0.5}
                style={{
                  transformOrigin: '43px 43px',
                  animation: capturing ? 'spin 0.6s linear infinite' : 'spin 8s linear infinite',
                }} />
            </svg>
            <div style={{
              position: 'absolute', inset: 10, borderRadius: '50%',

<script type="text/babel">
function ScanScreen({ photoUrl, part, onComplete, onError }) {
  const [progress, setProgress] = React.useState(0);
  const [detected, setDetected] = React.useState([]);
  const [statusLabel, setStatusLabel] = React.useState('Reading shape, colour, texture…');

  React.useEffect(() => {
    let cancelled = false;
    const start = Date.now();

    // Animation loop — caps at 95% until the real response lands.
    let raf;
    const tick = () => {
      if (cancelled) return;
      const elapsed = (Date.now() - start) / 1000;
      const t = Math.min(0.95, elapsed / 8); // 8s max anim, caps at 95%
      setProgress(t);
      if (t >= 0.3 && detected.length < 1) setDetected([PLANTS[0].id]);
      if (t >= 0.55 && detected.length < 2) setDetected([PLANTS[0].id, PLANTS[2].id]);
      if (t >= 0.8 && detected.length < 3) setDetected([PLANTS[0].id, PLANTS[2].id, PLANTS[1].id]);
      setStatusLabel(
        t < 0.35 ? 'Reading shape, colour, texture…'
          : t < 0.65 ? 'Thumbing the field guide…'
            : t < 0.9 ? 'Narrowing to species…'
              : 'Almost there.'
      );
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);

    // Fire the real identification call
    (async () => {
      try {
        const res = await fetch('/api/identify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: photoUrl, part: part || undefined }),
        });
        if (!res.ok) {
          const text = await res.text().catch(() => '');
          throw new Error(`Identify failed (${res.status}): ${text.slice(0, 200)}`);
        }
        const data = await res.json();
        if (cancelled) return;
        setProgress(1);
        setStatusLabel('Done.');
        // small delay to let user see 100%
        setTimeout(() => !cancelled && onComplete(data), 220);
      } catch (err) {
        if (cancelled) return;
        console.error(err);
        onError(err.message || 'Identification failed');
      }
    })();

    return () => { cancelled = true; cancelAnimationFrame(raf); };
  }, []);

  const matches = [
    { id: 'monstera', label: 'Family match', angle: -60 },
    { id: 'fern', label: 'Surface texture', angle: 40 },
    { id: 'lavender', label: 'Silhouette', angle: 140 },
  ];

  return (
    <div style={{
      width: '100%', height: '100%', position: 'relative',
      background: `radial-gradient(circle at 50% 35%, ${THEME.accentDeep}, ${THEME.ink})`,
      color: '#fff', fontFamily: FONTS.body, overflow: 'hidden',
    }}>
      {/* Blurred subject behind radar */}
      {photoUrl && (
        <div style={{
          position: 'absolute', inset: 0,
          background: `center/cover url(${photoUrl})`,
          filter: `blur(${(1 - progress) * 16 + 4}px) saturate(${0.3 + progress * 0.7})`,
          opacity: 0.35,
        }} />
      )}
      <div style={{
        position: 'absolute', inset: 0,
        background: `
          radial-gradient(ellipse at 30% 20%, ${THEME.accentGlow}44 0%, transparent 55%),
          radial-gradient(ellipse at 70% 60%, ${THEME.accent}66 0%, transparent 60%)
        `,
      }} />

      <div style={{
        position: 'relative', height: '60%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{ position: 'relative', width: 260, height: 260 }}>
          {[0, 1, 2].map(i => (
            <div key={i} style={{
              position: 'absolute', inset: 0, borderRadius: '50%',
              border: `1.5px solid ${THEME.accentGlow}66`,
              animation: `radarPulse 2s ${i * 0.5}s ease-out infinite`,
            }} />
          ))}
          <svg viewBox="0 0 260 260" width="260" height="260" style={{
            position: 'absolute', inset: 0,
            animation: 'spin 2.4s linear infinite',
          }}>
            <defs>
              <linearGradient id="scanbeam" x1="0" x2="1">
                <stop offset="0%" stopColor={THEME.accentGlow} stopOpacity="0" />
                <stop offset="100%" stopColor={THEME.accentGlow} stopOpacity="0.7" />
              </linearGradient>
            </defs>
            <path d="M130 130 L 260 130 A 130 130 0 0 0 130 0 Z" fill="url(#scanbeam)" />
          </svg>

          <div style={{
            position: 'absolute', inset: 55, borderRadius: '50%',
            background: photoUrl
              ? `center/cover url(${photoUrl})`
              : `radial-gradient(circle, ${THEME.accent}, ${THEME.accentDeep})`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: `0 0 40px ${THEME.accentGlow}66`,
            overflow: 'hidden',
          }}>
            {!photoUrl && <IconLeaf size={64} stroke="#fff" sw={1.5} />}
          </div>

          {matches.map((m, i) => {
            const visible = detected.includes(m.id);
            const rad = m.angle * Math.PI / 180;
            const r = 130;
            const x = 130 + Math.cos(rad) * r;
            const y = 130 + Math.sin(rad) * r;
            return (
              <div key={i} style={{
                position: 'absolute', left: x, top: y,
                width: 12, height: 12, marginLeft: -6, marginTop: -6,
                borderRadius: '50%', background: THEME.accentGlow,
                boxShadow: `0 0 0 4px ${THEME.accentGlow}33`,
                opacity: visible ? 1 : 0,
                transform: `scale(${visible ? 1 : 0.2})`,
                transition: 'all 400ms cubic-bezier(0.34, 1.6, 0.4, 1)',
              }}>
                <div style={{
                  position: 'absolute', left: x > 130 ? 18 : 'auto', right: x <= 130 ? 18 : 'auto',
                  top: -4, whiteSpace: 'nowrap',
                  background: 'rgba(255,255,255,0.15)',
                  backdropFilter: 'blur(10px)',
                  color: '#fff', padding: '4px 10px', borderRadius: 999,
                  fontSize: 11, fontWeight: 500,
                }}>{m.label}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{
        position: 'absolute', bottom: `calc(60px + env(safe-area-inset-bottom))`, left: 24, right: 24,
        textAlign: 'center',
      }}>
        <div style={{
          fontFamily: FONTS.heading, fontSize: 34, fontWeight: 500,
          letterSpacing: -0.5, marginBottom: 8,
        }}>{statusLabel}</div>
        <div style={{
          height: 3, background: 'rgba(255,255,255,0.15)', borderRadius: 3,
          overflow: 'hidden', maxWidth: 240, margin: '0 auto',
        }}>
          <div style={{
            height: '100%', width: `${progress * 100}%`,
            background: THEME.accentGlow, transition: 'width 0.2s',
          }} />
        </div>
        <div style={{ fontSize: 12, opacity: 0.6, marginTop: 10, letterSpacing: 0.5 }}>
          {Math.round(progress * 100)}%  •  {detected.length} matches
        </div>
      </div>
    </div>
  );
}
</script>

<script type="text/babel">
function useWikipediaSummary(scientificName, commonName, enabled) {
  const [state, setState] = React.useState({ loading: false, data: null, error: null });
  React.useEffect(() => {
    if (!enabled) { setState({ loading: false, data: null, error: null }); return; }
    let cancelled = false;
    const fetchSummary = async (title) => {
      const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`, { headers: { Accept: 'application/json' } });
      if (!res.ok) return null;
      const d = await res.json();
      if (d.type === 'disambiguation' || !d.extract) return null;
      return d;
    };
    (async () => {
      setState({ loading: true, data: null, error: null });
      try {
        let data = scientificName ? await fetchSummary(scientificName) : null;
        if (!data && commonName) data = await fetchSummary(commonName);
        if (cancelled) return;
        if (!data) setState({ loading: false, data: null, error: 'No Wikipedia article found for this species.' });
        else setState({ loading: false, data, error: null });
      } catch (e) {
        if (!cancelled) setState({ loading: false, data: null, error: e.message || 'Fetch failed' });
      }
    })();
    return () => { cancelled = true; };
  }, [scientificName, commonName, enabled]);
  return state;
}

function WikipediaVerifySheet({ open, onClose, plant, photoUrl }) {
  const { loading, data, error } = useWikipediaSummary(plant?.name, plant?.common, open);
  if (!open) return null;
  const wikiImg = data?.originalimage?.source || data?.thumbnail?.source || null;

  );
}

function BloomStrip({ months }) {

}

function CareTab({ plant }) {

  const items = [
    { icon: <IconSun size={22} stroke={THEME.accent} />, label: 'Light', value: care.light || '—' },
    { icon: <IconDrop size={22} stroke={THEME.accent} />, label: 'Water', value: care.water || '—' },

            {it.value}
          </div>
        </div>
      ))}
    </div>
  );
}

function NearbyTab({ plant }) {
  const mapRef = React.useRef(null);
  const mapInstance = React.useRef(null);
  const [total, setTotal] = React.useState(null);
  const [nearest, setNearest] = React.useState(null);
  const [err, setErr] = React.useState(null);

  React.useEffect(() => {
    let cancelled = false;

    (async () => {
      try {
        const [{ lat, lng }, taxonId] = await Promise.all([
          getGeo(),
          plant.taxonId ? Promise.resolve(plant.taxonId) : inatLookupTaxonId(plant.name),
        ]);
        if (!taxonId) throw new Error('Species not in iNaturalist');
        const data = await inatObservationsForTaxon(taxonId, lat, lng, 50);
        if (cancelled) return;

        setTotal(data.total_results ?? 0);

        if (!window.L || !mapRef.current) return;

        // Init map
        const map = window.L.map(mapRef.current, {
          zoomControl: false, attributionControl: false, scrollWheelZoom: false,
        }).setView([lat, lng], 11);
        mapInstance.current = map;

        window.L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 18,
        }).addTo(map);

        // "You are here" — pulsing orange marker
        const meIcon = window.L.divIcon({
          className: '',
          html: `<div style="width:16px;height:16px;border-radius:50%;background:${THEME.warm};border:3px solid #fff;box-shadow:0 0 0 4px ${THEME.warm}44"></div>`,
          iconSize: [16, 16], iconAnchor: [8, 8],
        });
        window.L.marker([lat, lng], { icon: meIcon, keyboard: false }).addTo(map);

        // Observations of this species
        let closestKm = null;
        for (const obs of (data.results || [])) {
          if (!obs.location) continue;
          const [oLat, oLng] = obs.location.split(',').map(Number);
          if (!Number.isFinite(oLat) || !Number.isFinite(oLng)) continue;
          const d = haversineKm(lat, lng, oLat, oLng);
          if (closestKm == null || d < closestKm) closestKm = d;
          const pinIcon = window.L.divIcon({
            className: '',
            html: `<div style="width:12px;height:12px;border-radius:50%;background:${THEME.accent};border:2px solid #fff"></div>`,
            iconSize: [12, 12], iconAnchor: [6, 6],
          });
          window.L.marker([oLat, oLng], { icon: pinIcon })
            .bindTooltip(`${obs.observed_on || '—'}${obs.place_guess ? ' · ' + obs.place_guess : ''}`, {
              direction: 'top', offset: [0, -6],
            })
            .addTo(map);
        }
        if (closestKm != null) setNearest(closestKm);
      } catch (e) {
        if (!cancelled) setErr(e.message || 'Could not load map');
      }
    })();

    return () => {
      cancelled = true;
      if (mapInstance.current) { mapInstance.current.remove(); mapInstance.current = null; }
    };
  }, [plant.taxonId, plant.name]);

  return (
    <div>
      <div style={{
        background: THEME.accentDeep, color: '#fff',
        borderRadius: THEME.radiusSm, padding: 16, marginBottom: 12,
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      }}>
        <div>
          <div style={{ fontSize: 12, opacity: 0.8, fontWeight: 600, letterSpacing: 0.5, textTransform: 'uppercase' }}>
            Around you (50 km)
          </div>
          <div style={{ fontFamily: FONTS.heading, fontSize: 32, fontWeight: 500, marginTop: 2 }}>
            {total == null ? (err ? '—' : '…') : total.toLocaleString()} sightings
          </div>
        </div>
        <div style={{ fontSize: 44 }}>🌿</div>
      </div>
      <div style={{
        height: 260, borderRadius: THEME.radiusSm, position: 'relative',
        overflow: 'hidden', boxShadow: THEME.shadow,
        background: THEME.surfaceAlt,
      }}>
        <div ref={mapRef} style={{ position: 'absolute', inset: 0 }} />
        {err && (
          <div style={{
            position: 'absolute', inset: 0,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 13, color: THEME.inkMuted, textAlign: 'center', padding: 20,
          }}>
            {err}
          </div>
        )}
        {nearest != null && !err && (
          <div style={{
            position: 'absolute', bottom: 10, left: 10,
            background: 'rgba(255,255,255,0.92)', backdropFilter: 'blur(10px)',
            padding: '6px 10px', borderRadius: 999,
            fontSize: 11, fontWeight: 600, color: THEME.ink, zIndex: 500,
          }}>📍 Nearest: {nearest < 1 ? `${Math.round(nearest * 1000)} m` : `${nearest.toFixed(1)} km`}</div>
        )}
      </div>
      <div style={{
        fontSize: 11, color: THEME.inkMuted, marginTop: 8, textAlign: 'right',
      }}>Data · <a href="https://www.inaturalist.org" target="_blank" rel="noopener" style={{ color: THEME.inkMuted }}>iNaturalist</a> · © OpenStreetMap</div>
    </div>
  );
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function SimilarTab({ plant }) {
  const sims = plant.similarDetail || [];

  if (sims.length === 0) {
    return (
      <div style={{
        background: THEME.surface, borderRadius: THEME.radiusSm,
        padding: 18, boxShadow: THEME.shadow,
        fontSize: 14, color: THEME.inkMuted, lineHeight: 1.5, textAlign: 'center',
      }}>
        No look-alikes were suggested for this match. The identifier is confident this one is distinctive enough that confusion is unlikely.
      </div>
    );
  }

  const openWiki = (sci) => {
    if (!sci) return;
    const url = `https://en.wikipedia.org/wiki/${encodeURIComponent(sci.replace(/ /g, '_'))}`;
    window.open(url, '_blank', 'noopener,noreferrer');
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      {sims.map((p, i) => (
        <div key={i} onClick={() => openWiki(p.name)} style={{
          padding: 14, background: THEME.surface,
          borderRadius: THEME.radiusSm, boxShadow: THEME.shadow,
          cursor: p.name ? 'pointer' : 'default',
        }}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 8 }}>
            <div style={{ fontFamily: FONTS.heading, fontSize: 19, fontWeight: 500, lineHeight: 1.1 }}>
              {p.common}
            </div>
            {p.name && (
              <div style={{ fontSize: 11, color: THEME.accentDeep, fontWeight: 600, flexShrink: 0 }}>
                Wiki ↗
              </div>
            )}
          </div>
          {p.name && (
            <div style={{ fontSize: 12, fontStyle: 'italic', color: THEME.inkMuted, marginTop: 2 }}>
              {p.name}
            </div>
          )}
          {p.differentiator && (
            <div style={{ fontSize: 13, color: THEME.ink, marginTop: 8, lineHeight: 1.45 }}>
              <span style={{ fontWeight: 600, color: THEME.accentDeep }}>How to tell apart: </span>
              {p.differentiator}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}
</script>

<script type="text/babel">
const FILTERS = [
  'All', 'Pet safe', 'Flowering now', 'Toxic',
  'Trees', 'Shrubs', 'Flowers', 'Fungi', 'Succulents', 'Ferns', 'Grasses', 'Vines', 'Mosses', 'Lichens',
];
const FILTER_TO_CATEGORY = {
  Trees: 'tree', Shrubs: 'shrub', Flowers: 'flower', Fungi: 'fungus',
  Succulents: 'succulent', Ferns: 'fern', Grasses: 'grass', Vines: 'vine',
  Mosses: 'moss', Lichens: 'lichen',
};

function applyJournalFilter(entries, filter) {
  if (filter === 'All') return entries;
  const currentMonth = new Date().getMonth() + 1;
  const wantCategory = FILTER_TO_CATEGORY[filter];
  return entries.filter(e => {
    const plant = e.plant || plantById(e.plantId);
    if (!plant) return false;
    if (wantCategory) return (plant.category || 'other') === wantCategory;
    if (filter === 'Pet safe') return plant.toxicity?.level === 'safe';
    if (filter === 'Toxic') {
      const t = plant.toxicity?.level;
      return t === 'toxic' || t === 'severe';
    }
    if (filter === 'Flowering now') {
      const months = plant.bloom?.months;
      return Array.isArray(months) && months.includes(currentMonth);
    }
    return true;
  });
}

function JournalScreen({ entries, loaded, onBack, onSelect, onDeleted, setToast }) {
  const [filter, setFilter] = React.useState('All');

  const removeEntry = async (id) => {
    try {
      await apiDeleteEntry(id);
      if (onDeleted) onDeleted();
    } catch (e) {
      if (setToast) setToast(`Delete failed: ${e.message}`);
    }
  };

  const filtered = applyJournalFilter(entries, filter);
  const safeCount = entries.filter(e => (e.plant?.toxicity?.level || 'unknown') === 'safe').length;
  const speciesCount = new Set(entries.map(e => e.plant?.id || e.plantId)).size;

  return (
    <div style={{
      width: '100%', height: '100%', background: THEME.bg,
      color: THEME.ink, fontFamily: FONTS.body,
      display: 'flex', flexDirection: 'column', overflow: 'hidden',
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10,
        padding: `calc(16px + env(safe-area-inset-top)) 16px 10px`,
      }}>
        <button onClick={onBack} style={{
          width: 40, height: 40, borderRadius: '50%',
          background: THEME.surface, boxShadow: THEME.shadow,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}><IconBack size={18} stroke={THEME.ink} /></button>
        <div style={{ flex: 1 }}>
          <div style={{
            fontFamily: FONTS.heading, fontSize: 32, fontWeight: 500,
            letterSpacing: -0.3, lineHeight: 1,
          }}>My field journal</div>
          <div style={{ fontSize: 12, color: THEME.inkMuted, marginTop: 2 }}>
            {entries.length} {entries.length === 1 ? 'entry' : 'entries'}
          </div>
        </div>
      </div>

      <div style={{
        display: 'flex', gap: 8, padding: '0 16px 14px', overflowX: 'auto',
        flexShrink: 0,
      }}>
        {FILTERS.map((f) => {
          const active = filter === f;
          return (
            <button key={f} onClick={() => setFilter(f)} style={{
              padding: '8px 14px', borderRadius: 999, flexShrink: 0,
              background: active ? THEME.accent : THEME.surface,
              color: active ? '#fff' : THEME.ink,
              fontSize: 13, fontWeight: 600,
              boxShadow: active ? 'none' : THEME.shadow,
              transition: 'background 160ms, color 160ms',
            }}>{f}</button>
          );
        })}
      </div>

      <div style={{ display: 'flex', gap: 10, padding: '0 16px 14px', flexShrink: 0 }}>
        <StatBox label="Species" value={speciesCount.toString()} />
        <StatBox label="Observations" value={entries.length.toString()} />
        <StatBox label="Pet safe" value={safeCount.toString()} />
      </div>

      <div style={{ flex: 1, overflow: 'auto', padding: '0 16px calc(20px + env(safe-area-inset-bottom))' }}>
        {!loaded ? (
          <div style={{
            textAlign: 'center', color: THEME.inkMuted, fontSize: 14,
            padding: '40px 20px',
          }}>Loading your journal…</div>
        ) : entries.length === 0 ? (
          <div style={{
            textAlign: 'center', color: THEME.inkMuted, fontSize: 14,
            padding: '40px 20px', lineHeight: 1.5,
          }}>
            Nothing here yet. Tap the capture button on the home screen and your saved finds will land here.
          </div>
        ) : filtered.length === 0 ? (
          <div style={{
            textAlign: 'center', color: THEME.inkMuted, fontSize: 14,
            padding: '30px 20px', lineHeight: 1.5,
          }}>
            No {filter.toLowerCase()} entries. Try another filter.
          </div>
        ) : filtered.map((j, i) => {
          const plant = j.plant || plantById(j.plantId);
          if (!plant) return null;
          return (
            <div key={j.id || i} onClick={() => onSelect(j)} style={{
              background: THEME.surface, borderRadius: THEME.radiusSm,
              padding: 14, marginBottom: 10, boxShadow: THEME.shadow,
              display: 'flex', gap: 14, cursor: 'pointer', position: 'relative',
            }}>
              <FloraImage plant={plant} size={72} rounded={THEME.radiusTight} photoUrl={j.photoUrl} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                  <div style={{ fontFamily: FONTS.heading, fontSize: 22, fontWeight: 500, lineHeight: 1.05 }}>
                    {plant.common}
                  </div>
                  <div style={{ fontSize: 11, color: THEME.inkMuted, flexShrink: 0, marginLeft: 8 }}>{formatEntryTime(j)}</div>
                </div>
                <div style={{ fontSize: 11, fontStyle: 'italic', color: THEME.inkMuted }}>
                  {plant.name}
                </div>
                <div style={{ display: 'flex', gap: 6, marginTop: 4, flexWrap: 'wrap', alignItems: 'center' }}>
                  {plant.toxicity?.level && plant.toxicity.level !== 'unknown' && (
                    <ToxBadge tox={plant.toxicity.level} small />
                  )}
                  {plant.bloom?.months?.includes(new Date().getMonth() + 1) && (
                    <span style={{
                      fontSize: 10, fontWeight: 600,
                      background: THEME.accentSoft, color: THEME.accentDeep,
                      padding: '2px 7px', borderRadius: 999,
                    }}>🌸 in bloom</span>
                  )}
                </div>
                {j.note && (
                  <div style={{ fontSize: 12, color: THEME.ink, marginTop: 6, lineHeight: 1.35 }}>
                    "{j.note}"
                  </div>
                )}
                {j.location && (
                  <div style={{
                    display: 'flex', alignItems: 'center', gap: 4, fontSize: 11,
                    color: THEME.inkMuted, marginTop: 6,
                  }}>
                    <IconPin size={11} stroke={THEME.inkMuted} /> {j.location}
                  </div>
                )}
              </div>
              <button onClick={(e) => { e.stopPropagation(); if (confirm(`Remove "${plant.common}" from your journal?`)) removeEntry(j.id); }} aria-label="Delete entry" style={{
                position: 'absolute', bottom: 8, right: 8,
                width: 32, height: 32, borderRadius: '50%',
                background: THEME.bg, boxShadow: THEME.shadow,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <IconTrash size={14} stroke="#B3261E" />
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function StatBox({ label, value }) {
  return (
    <div style={{
      flex: 1, background: THEME.surface, borderRadius: THEME.radiusSm,
      padding: '10px 12px', boxShadow: THEME.shadow,
    }}>
      <div style={{
        fontSize: 10, color: THEME.inkMuted, textTransform: 'uppercase',
        fontWeight: 600, letterSpacing: 0.5,
      }}>{label}</div>
      <div style={{
        fontFamily: FONTS.heading, fontSize: 30, fontWeight: 500,
        color: THEME.ink, lineHeight: 1,
      }}>{value}</div>
    </div>
  );
}
</script>

<!-- ============================================================
     SCREEN — MAP
     ============================================================ -->
<script type="text/babel">
// Per-category emoji + ring colour for map markers.
const MAP_MARKER_BY_CATEGORY = {
  tree:      { emoji: '🌳', color: '#3a7d44' },
  shrub:     { emoji: '🌿', color: '#5a9b6e' },
  flower:    { emoji: '🌸', color: '#d65a8a' },
  grass:     { emoji: '🌾', color: '#b09a3e' },
  fern:      { emoji: '🪴', color: '#4a7c5a' },
  succulent: { emoji: '🌵', color: '#5a8a4a' },
  vine:      { emoji: '🍃', color: '#6aa168' },
  fungus:    { emoji: '🍄', color: '#b04a3a' },
  lichen:    { emoji: '🪨', color: '#7c8a85' },
  moss:      { emoji: '🌱', color: '#4f9c5e' },
  other:     { emoji: '📍', color: '#6b7b63' },
};

function buildEntryIcon(entry) {
  const cat = (entry?.plant?.category || entry?.category || 'other').toLowerCase();
  const m = MAP_MARKER_BY_CATEGORY[cat] || MAP_MARKER_BY_CATEGORY.other;
  return L.divIcon({
    className: 'flora-marker',
    html: `<div style="width:38px;height:38px;background:#fff;border:3px solid ${m.color};border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,0.35);font-size:20px;line-height:1">${m.emoji}</div>`,
    iconSize: [38, 38],
    iconAnchor: [19, 19],
    popupAnchor: [0, -20],
  });
}

function buildUserIcon() {
  return L.divIcon({
    className: 'flora-user-marker',
    html: `<div style="position:relative;width:18px;height:18px"><div style="position:absolute;inset:0;background:#1976d2;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 6px rgba(25,118,210,0.18)"></div></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9],
  });
}

function MapScreen({ entries = [], onBack, onSelect }) {
  const mapRef = React.useRef(null);
  const mapInstance = React.useRef(null);
  const entryLayer = React.useRef(null);
  const userMarker = React.useRef(null);
  const userLatLng = React.useRef(null);
  const fittedOnce = React.useRef(false);

  const withCoords = React.useMemo(() => entries.filter(e =>
    e.coords && typeof e.coords.lat === 'number' && typeof e.coords.lng === 'number'
  ), [entries]);

  // Effect 1: initialise the map once.
  React.useEffect(() => {
    if (!mapRef.current || mapInstance.current) return;
    if (typeof L === 'undefined') return;

    L.Icon.Default.imagePath = 'https://unpkg.com/leaflet@1.9.4/dist/images/';
    const map = L.map(mapRef.current, { zoomControl: true, attributionControl: true })
      .setView([20, 0], 2);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    }).addTo(map);
    mapInstance.current = map;
    entryLayer.current = L.layerGroup().addTo(map);

    // Leaflet needs the container to have real dimensions before tiles paint
    // and touch handlers bind correctly.
    const invalidate = () => map.invalidateSize();
    const raf = requestAnimationFrame(() => { invalidate(); setTimeout(invalidate, 120); });
    window.addEventListener('resize', invalidate);
    window.addEventListener('orientationchange', invalidate);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', invalidate);
      window.removeEventListener('orientationchange', invalidate);
      map.remove();
      mapInstance.current = null;
      entryLayer.current = null;
      userMarker.current = null;
    };
  }, []);

  // Effect 2: render entry markers whenever entries change.
  React.useEffect(() => {
    const map = mapInstance.current;
    const layer = entryLayer.current;
    if (!map || !layer) return;
    layer.clearLayers();

    withCoords.forEach((e) => {
      const marker = L.marker([e.coords.lat, e.coords.lng], { icon: buildEntryIcon(e) });
      const name = (e.plant?.common || 'Unknown').replace(/</g, '&lt;');
      const sci = (e.plant?.name || '').replace(/</g, '&lt;');
      const date = formatEntryTime(e).replace(/</g, '&lt;');
      const img = e.photoUrl
        ? `<div style="width:180px;height:110px;background:#000 center/cover url(${e.photoUrl});border-radius:6px;margin-bottom:6px"></div>`
        : '';
      const html = `
        ${img}
        <div style="font-weight:700;font-size:14px">${name}</div>
        <div style="font-style:italic;color:#6b7b63;font-size:12px">${sci}</div>
        <div style="font-size:11px;margin-top:4px;color:#6b7b63">${date}</div>
        <button data-entry-id="${e.id}" style="margin-top:8px;padding:6px 12px;border:none;background:#3d5a40;color:#fff;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;width:100%">Open →</button>
      `;
      marker.bindPopup(L.popup({ maxWidth: 220 }).setContent(html));
      marker.on('popupopen', () => {
        const btn = document.querySelector(`button[data-entry-id="${e.id}"]`);
        if (btn) btn.addEventListener('click', () => onSelect(e), { once: true });
      });
      marker.addTo(layer);
    });

    // Auto-fit on the first time we get markers.
    if (!fittedOnce.current && withCoords.length) {
      try {
        const group = L.featureGroup(layer.getLayers());
        map.fitBounds(group.getBounds().pad(0.25), { maxZoom: 15 });
        fittedOnce.current = true;
      } catch {}
    }
  }, [withCoords, onSelect]);

  // Effect 3: try to plot the user's current location (independent of entries).
  React.useEffect(() => {
    if (!navigator.geolocation) return;
    let cancelled = false;
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        if (cancelled || !mapInstance.current) return;
        userLatLng.current = [pos.coords.latitude, pos.coords.longitude];
        if (userMarker.current) userMarker.current.remove();
        userMarker.current = L.marker(userLatLng.current, { icon: buildUserIcon(), zIndexOffset: 1000 })
          .bindPopup('You are here')
          .addTo(mapInstance.current);
        // If the entries effect hasn't already auto-fitted (e.g. no pinned
        // discoveries yet, or geo resolved first), centre on the user.
        if (!fittedOnce.current) {
          mapInstance.current.setView(userLatLng.current, 14);
        }
      },
      (err) => console.warn('[Flora] map geolocation failed', err),
      { timeout: 10000, maximumAge: 5 * 60 * 1000, enableHighAccuracy: true }
    );
    return () => { cancelled = true; };
  }, []);

  return (
    <div style={{
      width: '100%', height: '100%', background: THEME.bg,
      color: THEME.ink, fontFamily: FONTS.body,
      display: 'flex', flexDirection: 'column', overflow: 'hidden',
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10,
        padding: `calc(16px + env(safe-area-inset-top)) 16px 10px`,
        flexShrink: 0,
      }}>
        <button onClick={onBack} style={{
          width: 40, height: 40, borderRadius: '50%',
          background: THEME.surface, boxShadow: THEME.shadow,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}><IconBack size={18} stroke={THEME.ink} /></button>
        <div style={{ flex: 1 }}>
          <div style={{
            fontFamily: FONTS.heading, fontSize: 32, fontWeight: 500,
            letterSpacing: -0.3, lineHeight: 1,
          }}>Discoveries map</div>
          <div style={{ fontSize: 12, color: THEME.inkMuted, marginTop: 2 }}>
            {withCoords.length} pinned {withCoords.length === 1 ? 'discovery' : 'discoveries'}
            {entries.length > withCoords.length && (
              <span> · {entries.length - withCoords.length} without location</span>
            )}
          </div>
        </div>
      </div>
      <div ref={mapRef} style={{ flex: 1, minHeight: 0, width: '100%' }} />
      {withCoords.length === 0 && (
        <div style={{
          padding: '12px 16px calc(16px + env(safe-area-inset-bottom))',
          background: THEME.surface, boxShadow: `0 -2px 10px rgba(0,0,0,0.05)`,
          fontSize: 13, color: THEME.inkMuted, textAlign: 'center', flexShrink: 0,
        }}>
          {entries.length === 0
            ? 'Save a discovery to pin it here.'
            : `${entries.length} entries saved without location. Grant location permission and save a new discovery to start mapping.`}
        </div>
      )}
    </div>
  );
}
</script>

<!-- ============================================================
     APP SHELL
     ============================================================ -->
<script type="text/babel">
const VALID_CATEGORIES = ['tree', 'shrub', 'flower', 'grass', 'fern', 'succulent', 'vine', 'fungus', 'lichen', 'moss', 'other'];

function normaliseMatch(m) {
  // Claude returns structured data matching this shape. Defensive defaults for anything missing.
  const tox = (m.toxicity?.level || 'unknown').toLowerCase();
  const rawCat = (m.category || '').toLowerCase();
  const category = VALID_CATEGORIES.includes(rawCat) ? rawCat : 'other';
  const plant = {
    id: m.id || (m.name || 'unknown').toLowerCase().replace(/\s+/g, '-'),
    name: m.scientific_name || m.name || 'Unknown species',
    common: m.common_name || m.name || 'Unknown',
    family: m.family || '—',
    category,
    colors: pickColors(tox),
    photo: 'linear-gradient(135deg, #1f3a28 0%, #2d5a3d 35%, #4a7c5a 70%, #8cb89a 100%)',
    leafShape: pickLeafShape(m.common_name || m.name),
    tagline: m.tagline || m.description || '',
    native: m.native_range || m.native || '—',
    habitat: m.habitat || '—',
    bloom: {
      months: Array.isArray(m.bloom?.months) ? m.bloom.months : [],
      label: m.bloom?.label || m.bloom_label || 'Not specified',
    },
    toxicity: {
      level: tox === 'safe' || tox === 'toxic' || tox === 'severe' ? tox : 'unknown',
      note: m.toxicity?.note || 'No toxicity information.',
    },
    edibility: m.edibility || '—',
    care: {
      light: m.care?.light || '—',
      water: m.care?.water || '—',
      humidity: m.care?.humidity || '—',
      temp: m.care?.temperature || m.care?.temp || '—',
    },
    nearby: m.nearby ?? null,
    tags: m.tags || [],
    similarDetail: Array.isArray(m.similar) ? m.similar.map(s => ({
      common: s.common_name || s.common || s.scientific_name || 'Unknown',
      name: s.scientific_name || s.name || '',
      differentiator: s.differentiator || s.why || '',
    })) : [],
  };
  return {
    plant,
    conf: typeof m.confidence === 'number' ? m.confidence : 0.8,
  };
}

const CATEGORY_LABEL = {
  tree: 'Tree', shrub: 'Shrub', flower: 'Flower', grass: 'Grass', fern: 'Fern',
  succulent: 'Succulent', vine: 'Vine', fungus: 'Fungus', lichen: 'Lichen',
  moss: 'Moss', other: 'Other',
};

function FloraApp() {
  const [screen, setScreen] = React.useState('home');
  const [detailReturn, setDetailReturn] = React.useState('results'); // which screen detail should go back to
  const [photoUrl, setPhotoUrl] = React.useState(null);
  const [matches, setMatches] = React.useState([]);
  const [activePlant, setActivePlant] = React.useState(null);
  const [journalEntries, setJournalEntries] = React.useState([]);
  const [journalLoaded, setJournalLoaded] = React.useState(false);
  const [activeJournalId, setActiveJournalId] = React.useState(null);
  const [toast, setToastRaw] = React.useState(null);
  const toastTimer = React.useRef(null);
  const setToast = (msg) => {
    setToastRaw(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToastRaw(null), 3200);
  };

  const refreshJournal = React.useCallback(async () => {
    try {
      const list = await apiListEntries();
      setJournalEntries(list);
      setJournalLoaded(true);
    } catch (e) {
      console.error('[Flora] journal load failed', e);
      setJournalLoaded(true);
      setToast(`Couldn't load journal: ${e.message}`);
    }
  }, []);

  React.useEffect(() => { refreshJournal(); }, [refreshJournal]);

  const recentCount = journalEntries.length;

  const [scanPart, setScanPart] = React.useState(null);

  const startScan = (dataUrl, part) => {
    setPhotoUrl(dataUrl);
    setMatches([]);
    setScanPart(part || null);
    setScreen('scan');
  };

  const onScanComplete = (data) => {
    const normalised = (data.matches || []).map(normaliseMatch);
    setMatches(normalised);
    setScreen('results');
  };

  const onScanError = (msg) => {
    alert('Sorry — ' + msg);
    setScreen('home');
  };

  const onSaveMatch = async (match) => {
    const date = new Date().toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    // Optimistic entry so the journal updates instantly. The real server
    // entry replaces this one on success, or we roll it back on failure.
    const tempId = 'tmp-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    const optimistic = {
      id: tempId,
      plant: match.plant,
      category: match.plant.category || 'other',
      photoUrl, // base64 data URL — rendered locally until the server URL arrives
      date,
      location: 'Captured here',
      coords: null,
      note: match.plant.tagline || '',
      _pending: true,
    };
    setJournalEntries(prev => [optimistic, ...prev]);
    setToast('Saving…');

    // Wait up to 8s for geolocation. This is generous because the browser's
    // first-use permission prompt can take several seconds to resolve, and
    // a saved entry without coords won't show on the map.
    let coords = null;
    try { coords = await Promise.race([getGeo(), new Promise(r => setTimeout(() => r(null), 8000))]); }
    catch { coords = null; }

    try {
      await apiSaveEntry({
        plant: match.plant,
        photoUrl,
        date,
        location: 'Captured here',
        coords,
        note: match.plant.tagline || '',
      });
      await refreshJournal();
      setToast('Saved to journal');
    } catch (e) {
      console.error('[Flora] save failed', e);
      setJournalEntries(prev => prev.filter(x => x.id !== tempId));
      setToast(`Couldn't save: ${e.message}`);
    }
  };

  const openDetail = (matchOrEntry) => {
    // Accept either a ResultsScreen match {plant, conf} or a Journal entry {id, plant, photoUrl, ...}
    setActivePlant(matchOrEntry.plant);
    if (matchOrEntry.photoUrl) setPhotoUrl(matchOrEntry.photoUrl);
    // Only treat as journal entry if it has a persisted id (server UUIDs, not 'tmp-' optimistic ones)
    const isJournalEntry = matchOrEntry.id && !String(matchOrEntry.id).startsWith('tmp-');
    setActiveJournalId(isJournalEntry ? matchOrEntry.id : null);
    setDetailReturn(screen); // remember where we came from
    setScreen('detail');
  };

  const handleDeleteJournalEntry = async (id) => {
    await apiDeleteEntry(id);
    await refreshJournal();
    setActiveJournalId(null);
    setScreen(detailReturn || 'journal');
    setToast('Removed from journal');
  };

  const backFromDetail = () => {
    setScreen(detailReturn || 'home');
  };

  return (
    <div style={{ width: '100%', height: '100%' }}>
      {screen === 'home' && (
        <HomeScreen
          onCapture={startScan}
          onOpenJournal={() => setScreen('journal')}
          onOpenMap={() => setScreen('map')}
          onSelectPlant={(plant) => openDetail({ plant, photoUrl: plant.photoUrl || null })}
          recentCount={recentCount}
          recentEntries={journalEntries.slice(0, 3)}
        />
      )}
      {screen === 'scan' && (
        <ScanScreen
          photoUrl={photoUrl}
          part={scanPart}
          onComplete={onScanComplete}
          onError={onScanError}
        />
      )}
      {screen === 'results' && (
        <ResultsScreen
          photoUrl={photoUrl}
          matches={matches}
          onBack={() => setScreen('home')}
          onSelect={openDetail}
          onSave={onSaveMatch}
        />
      )}
      {screen === 'detail' && (
        <DetailScreen
          plant={activePlant}
          photoUrl={photoUrl}
          onBack={backFromDetail}
          journalId={activeJournalId}
          onDelete={handleDeleteJournalEntry}
        />
      )}
      {screen === 'journal' && (
        <JournalScreen
          entries={journalEntries}
          loaded={journalLoaded}
          onBack={() => setScreen('home')}
          onSelect={openDetail}
          onDeleted={refreshJournal}
          setToast={setToast}
        />
      )}
      {screen === 'map' && (
        <MapScreen
          entries={journalEntries}
          onBack={() => setScreen('home')}
          onSelect={openDetail}
        />
      )}
      {toast && (
        <div style={{
          position: 'fixed', left: '50%', bottom: 'calc(28px + env(safe-area-inset-bottom))',
          transform: 'translateX(-50%)',
          background: THEME.ink, color: '#fff',
          padding: '10px 16px', borderRadius: 999,
          fontSize: 13, fontWeight: 600,
          boxShadow: '0 8px 24px rgba(0,0,0,0.25)',
          maxWidth: '90%', textAlign: 'center',
          zIndex: 200, pointerEvents: 'none',
          animation: 'slideUp 180ms ease',
        }}>{toast}</div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<FloraApp />);
</script>

</body>
</html>
